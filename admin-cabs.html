<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CabEase — Manage Cabs</title>
    <meta name="description" content="Admin page to add and manage cabs" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app-shell">
        <aside id="sidebar"></aside>
        <div class="main-content">
            <header id="topbar"></header>
            <main class="page-body">
                <div class="section-header">
                    <h2 class="section-title">Manage Cabs</h2>
                    <button class="btn btn-primary" onclick="openModal()">+ Add Cab</button>
                </div>

                <div class="card">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Cab Number</th>
                                    <th>Cab Type</th>
                                    <th>Availability</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="cabsBody"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add/Edit Cab Modal -->
    <div class="modal-overlay" id="cabModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Add Cab</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId" />
                <div class="form-group">
                    <label for="cab_number">Cab Number <span style="color:var(--danger)">*</span></label>
                    <input type="text" id="cab_number" placeholder="e.g. KA01AB1234" />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="cab_type">Cab Type <span style="color:var(--danger)">*</span></label>
                        <select id="cab_type">
                            <option value="Mini">Mini</option>
                            <option value="Sedan">Sedan</option>
                            <option value="SUV">SUV</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="availability">Availability</label>
                        <select id="availability">
                            <option value="Available">Available</option>
                            <option value="Not Available">Not Available</option>
                        </select>
                    </div>
                </div>
                <div id="modalAlert" class="alert" style="display:none;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveCab()">💾 Save Cab</button>
            </div>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="auth.js"></script>
    <script src="sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Auth.requireAuth('admin');
            Sidebar.render();
            Sidebar.renderTopbar('Manage Cabs');
            renderTable();
        });

        function renderTable() {
            const cabs = DB.getAll('cabs');
            const tbody = document.getElementById('cabsBody');

            if (!cabs.length) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No cabs found. Add your first cab!</td></tr>';
                return;
            }

            const availBadge = a => `<span class="badge badge-${a === 'Available' ? 'available' : 'not-available'}">${a}</span>`;
            const typeBadge = t => {
                const map = { Mini: 'blue', Sedan: 'assigned', SUV: 'orange' };
                return `<span class="badge badge-${map[t] || 'pending'}">${t}</span>`;
            };

            tbody.innerHTML = cabs.map((c, i) => `
        <tr>
          <td class="text-muted text-sm">${i + 1}</td>
          <td class="fw-600" style="font-family:monospace;letter-spacing:.5px;">${c.cab_number}</td>
          <td>${typeBadge(c.cab_type)}</td>
          <td>${availBadge(c.availability)}</td>
          <td>
            <button class="btn btn-sm btn-outline" onclick="openEditModal('${c.id}')">✏️ Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteCab('${c.id}')" style="margin-left:6px;">🗑</button>
          </td>
        </tr>
      `).join('');
        }

        function openModal() {
            document.getElementById('editId').value = '';
            document.getElementById('cab_number').value = '';
            document.getElementById('cab_type').value = 'Mini';
            document.getElementById('availability').value = 'Available';
            document.getElementById('cab_number').removeAttribute('readonly');
            document.getElementById('modalTitle').textContent = 'Add Cab';
            document.getElementById('modalAlert').style.display = 'none';
            document.getElementById('cabModal').classList.add('open');
        }

        function openEditModal(id) {
            const c = DB.getById('cabs', id);
            if (!c) return;
            document.getElementById('editId').value = c.id;
            document.getElementById('cab_number').value = c.cab_number;
            document.getElementById('cab_type').value = c.cab_type;
            document.getElementById('availability').value = c.availability;
            // Don't allow changing cab number on edit
            document.getElementById('cab_number').setAttribute('readonly', true);
            document.getElementById('modalTitle').textContent = 'Edit Cab';
            document.getElementById('modalAlert').style.display = 'none';
            document.getElementById('cabModal').classList.add('open');
        }

        function closeModal() { document.getElementById('cabModal').classList.remove('open'); }

        function saveCab() {
            const id = document.getElementById('editId').value;
            const cab_number = document.getElementById('cab_number').value.trim();
            const cab_type = document.getElementById('cab_type').value;
            const availability = document.getElementById('availability').value;

            if (!cab_number) {
                const a = document.getElementById('modalAlert');
                a.className = 'alert alert-danger';
                a.textContent = 'Cab number is required.';
                a.style.display = 'flex';
                return;
            }

            if (!id) {
                // Check duplicate cab number
                const existing = DB.findOne('cabs', c => c.cab_number === cab_number);
                if (existing) {
                    const a = document.getElementById('modalAlert');
                    a.className = 'alert alert-danger';
                    a.textContent = 'A cab with this number already exists.';
                    a.style.display = 'flex';
                    return;
                }
                DB.create('cabs', { cab_number, cab_type, availability });
            } else {
                DB.update('cabs', id, { cab_type, availability });
            }
            closeModal();
            renderTable();
        }

        function deleteCab(id) {
            if (!confirm('Delete this cab?')) return;
            DB.remove('cabs', id);
            renderTable();
        }

        document.getElementById('cabModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    </script>
</body>

</html>
