<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CabEase — Register</title>
  <meta name="description" content="Register a new user account on CabEase" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">🚖</div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join CabEase and start booking rides</p>
      </div>
      <div class="auth-body">
        <div id="alertBox" class="alert" style="display:none;"></div>
        <form id="registerForm" novalidate>
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" placeholder="10-digit mobile number" maxlength="15" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6" />
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;" id="registerBtn">
            Create Account
          </button>
        </form>
      </div>
      <div class="auth-footer">
        Already have an account? <a href="index.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Auth.redirectIfLoggedIn();

      document.getElementById('registerForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const name     = document.getElementById('name').value.trim();
        const email    = document.getElementById('email').value.trim();
        const phone    = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const alertBox = document.getElementById('alertBox');
        const btn      = document.getElementById('registerBtn');

        alertBox.style.display = 'none';

        // Validation
        if (!name || !email || !phone || !password) {
          showAlert('All fields are required.', 'danger'); return;
        }
        if (password.length < 6) {
          showAlert('Password must be at least 6 characters.', 'danger'); return;
        }
        // Check duplicate email
        const existing = DB.findOne('users', u => u.email === email);
        if (existing) {
          showAlert('An account with this email already exists.', 'danger'); return;
        }

        btn.textContent = 'Creating account…';
        btn.disabled = true;

        setTimeout(() => {
          DB.create('users', { name, email, phone, password, role: 'user' });
          showAlert('Account created successfully! Redirecting to login…', 'success');
          setTimeout(() => window.location.href = 'index.html', 1800);
        }, 300);
      });

      function showAlert(msg, type) {
        const alertBox = document.getElementById('alertBox');
        alertBox.className = `alert alert-${type}`;
        alertBox.textContent = msg;
        alertBox.style.display = 'flex';
      }
    });
  </script>
</body>
</html>
